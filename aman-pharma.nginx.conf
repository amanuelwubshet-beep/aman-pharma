# Aman Pharma - Nginx Configuration
# Place this file at: /etc/nginx/conf.d/aman-pharma.conf
# (or on some systems: /etc/nginx/sites-available/aman-pharma)

# --- HTTP (redirect to HTTPS) ---
server {
    listen 80;
    server_name amanpharma.com www.amanpharma.com;

    # Let's Encrypt verification (needed for certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl http2;
    server_name amanpharma.com www.amanpharma.com;

    # SSL certificates (get via: sudo certbot --nginx -d amanpharma.com -d www.amanpharma.com)
    ssl_certificate /etc/letsencrypt/live/amanpharma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amanpharma.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/amanpharma.com/chain.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Project root (static files)
    root /home/amex/Documents/aman-pharma;
    index index.html;

    # Serve static files directly (faster than going through Node)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests -> Node.js backend on port 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for Telebirr payment callbacks
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # All other routes -> serve static HTML or 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ (store\.db|\.env|package\.json|package-lock\.json|node_modules|init-db\.js) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}
