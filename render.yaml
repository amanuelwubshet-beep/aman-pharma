services:
  - type: web
    name: aman-pharma
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node init-db.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USERNAME
        value: wubshet
      - key: ADMIN_PASSWORD
        value: amanuel@123
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: TB_FABRIC_APP_ID
        sync: false
      - key: TB_APP_SECRET
        sync: false
      - key: TB_MERCHANT_ID
        sync: false
      - key: TB_PRIVATE_KEY_PATH
        value: ./telebirr-private.pem
      - key: TB_PUBLIC_KEY
        sync: false
      - key: TB_NOTIFY_URL
        value: https://aman-pharma.onrender.com/api/payments/telebirr/callback
      - key: TB_RETURN_URL
        value: https://aman-pharma.onrender.com/store.html?payment=done
      - key: ICECAT_USERNAME
        sync: false
      - key: ICECAT_APP_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_FROM
        value: noreply@amanpharma.com
      - key: CONTACT_TO
        value: wubshetbezu@gmail.com
      - key: COMMISSION_PHONE
        value: "251960909494"
